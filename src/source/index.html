<script>
async function omg(msj)
{
    const url = "/omg";

    const response = await fetch(url, {
        method: "POST", 
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ msj: msj })
    });
    const datos = await response.json();
    console.log(datos)

}
